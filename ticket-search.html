<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Ticket - IT TICKET DESK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EAF1FB;
    --card:#FFFFFF;
    --ink:#132447;
    --slate:#5A6C8C;
    --slate-light:#9AACC9;
    --line:#D6E1F3;
    --grey:#e5e7eb;
    --blue:#2454C7;
    --blue-light:#E4EBFB;
    --blue-deep:#0E1E3D;
    --green:#2E7D63;
    --green-light:#DEEFE8;
    --amber:#C97A2B;
    --amber-light:#F8EADA;
    --orange:#FF5722;
    --orange-light:rgba(255,87,34,0.15);
    --red:#A63A2E;
    --red-light:#F5E2DE;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    background-color:var(--paper);
    background-image:
      linear-gradient(90deg, rgba(36,84,199,0.06) 1px, transparent 1px),
      linear-gradient(0deg, rgba(36,84,199,0.06) 1px, transparent 1px),
      radial-gradient(circle, rgba(36,84,199,0.16) 1.4px, transparent 1.6px);
    background-size:46px 46px, 46px 46px, 46px 46px;
    background-attachment:fixed;
    position:relative;
  }
  .circuit{
    position:fixed;
    pointer-events:none;
    z-index:0;
    opacity:0.14;
  }
  .circuit.tr{ top:-40px; right:-40px; width:340px; height:340px; }
  .circuit.bl{ bottom:-40px; left:-40px; width:300px; height:300px; transform:rotate(180deg); }

  .wrap{
    position:relative;
    z-index:1;
    max-width:1040px;
    margin:0 auto;
    padding:16px 24px 80px;
  }
  header.hero{
    position:relative;
    width:100%;
    min-height:300px;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    z-index:1;
  }
  .hero-overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(11,23,48,0.45) 0%, rgba(11,23,48,0.68) 55%, var(--paper) 100%);
  }
  .hero-content{
    position:relative;
    z-index:1;
    text-align:center;
    padding:64px 24px 40px;
  }
  .icon-badge{
    width:52px;
    height:52px;
    border-radius:14px;
    background:linear-gradient(145deg, #2454C7, #133C9E);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.35);
    margin:0 auto 14px;
  }
  .hero-content h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:32px;
    margin:0 0 10px;
    letter-spacing:0.03em;
    color:#fff;
    text-shadow:0 2px 14px rgba(0,0,0,0.3);
  }
  .hero-content .subtitle{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    color:#D9E4FB;
    letter-spacing:0.06em;
  }

  .search-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:32px;
    box-shadow:0 12px 32px rgba(19,36,71,0.08);
    max-width:700px;
    margin:0 auto 32px;
  }
  .search-card .label{
    font-size:12px;
    font-weight:600;
    color:var(--slate);
    margin-bottom:14px;
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  .search-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
    margin-bottom:14px;
  }
  @media (max-width:500px){
    .search-grid{grid-template-columns:1fr;}
  }
  .search-field{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .search-field label{
    font-size:12px;
    font-weight:600;
    color:var(--slate);
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  .search-field input{
    font-family:'IBM Plex Mono',monospace;
    font-size:14px;
    padding:11px 14px;
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--paper);
    color:var(--ink);
  }
  .search-field input:focus{
    outline:none;
    border-color:var(--blue);
    box-shadow:0 0 0 3px var(--blue-light);
  }
  .search-field input::placeholder{
    color:var(--slate-light);
  }
  .search-btn{
    background:var(--blue);
    color:#fff;
    border:none;
    border-radius:8px;
    padding:11px 22px;
    font-family:'Inter',sans-serif;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:background 0.15s ease;
  }
  .search-btn:hover{background:#173C99;}
  .search-btn:disabled{background:var(--slate-light);cursor:not-allowed;}

  .msg{
    font-size:13px;
    line-height:1.55;
    padding:14px 16px 14px 14px;
    border-radius:10px;
    display:none;
    gap:11px;
    border-left:4px solid transparent;
    box-shadow:0 6px 18px rgba(19,36,71,0.06);
    margin-bottom:20px;
  }
  .msg.show{display:flex;}
  .msg .msg-icon{
    flex:none;
    width:22px;
    height:22px;
    margin-top:1px;
  }
  .msg.err{background:var(--red-light);color:var(--red);border-left-color:var(--red);}
  .msg.ok{background:var(--blue-light);color:var(--blue-deep);border-left-color:var(--blue);}

  .result-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:28px;
    box-shadow:0 8px 20px rgba(19,36,71,0.05);
    display:none;
    max-width:700px;
    margin:0 auto;
  }
  .result-card.show{display:block;}

  .result-header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:12px;
    margin-bottom:20px;
    padding-bottom:16px;
    border-bottom:1px solid var(--line);
  }
  .ticket-id-display{
    font-family:'IBM Plex Mono',monospace;
    font-size:20px;
    font-weight:600;
    color:var(--blue-deep);
  }
  .status-display{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    font-weight:600;
    padding:5px 12px;
    border-radius:20px;
  }
  .status-display.open{
    background:var(--green-light);
    color:var(--green);
  }
  .status-display.inprogress{
    background:var(--amber-light);
    color:var(--amber);
  }
  .status-display.closed{
    background:var(--grey);
    color:var(--slate);
  }
  .status-dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:currentColor;
  }

  .result-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:20px;
  }
  @media (max-width:500px){
    .result-grid{grid-template-columns:1fr;}
  }
  .result-field{
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .result-label{
    font-size:11px;
    font-weight:600;
    color:var(--slate);
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  .result-value{
    font-size:14px;
    color:var(--ink);
    line-height:1.5;
    word-break:break-word;
  }

  .result-remark{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:8px;
    padding:14px;
    font-size:13px;
    line-height:1.6;
    color:var(--ink);
  }

  .nav-link{
    text-align:center;
    margin-top:24px;
    padding-top:24px;
    border-top:1px solid var(--line);
  }
  .nav-link a{
    color:var(--blue);
    text-decoration:none;
    font-size:13px;
    font-weight:600;
  }
  .nav-link a:hover{text-decoration:underline;}

</style>
</head>

    msgBox.innerHTML = "";
    msgBox.className = "msg";
  }

  function hideResult() {
    resultCard.className = "result-card";
  }

  function formatStatus(status) {
    status = status || "";
    if (status === "Open") return "OPEN";
    if (status === "In Progress") return "IN PROGRESS";
    if (status === "Closed") return "CLOSED";
    return status.toUpperCase();
  }

  function getStatusClass(status) {
    status = (status || "").toLowerCase();

    if (status === "open") return "open";
    if (status === "in progress") return "inprogress";
    if (status === "closed") return "closed";

    return "open";
  }

  function displayResult(ticket) {

    document.getElementById("resultId").textContent = ticket.ticketId || "-";
    document.getElementById("statusText").textContent = formatStatus(ticket.status);
    document.getElementById("resultStatus").className = "status-display " + getStatusClass(ticket.status);

    document.getElementById("resultName").textContent = ticket.name || "-";
    document.getElementById("resultPriority").textContent = ticket.priority || "-";
    document.getElementById("resultCategory").textContent = ticket.category || "-";
    document.getElementById("resultEmail").textContent = ticket.email || "-";
    document.getElementById("resultMobile").textContent = ticket.mobile || "-";
    document.getElementById("resultDept").textContent = ticket.department || "-";
    document.getElementById("resultShift").textContent = ticket.shift || "-";
    document.getElementById("resultLocation").textContent = ticket.location || "-";
    document.getElementById("resultTime").textContent = ticket.timestamp || "-";
    document.getElementById("resultSubject").textContent = ticket.subject || "-";
    document.getElementById("resultRemark").textContent = ticket.remarks || "-";

    resultCard.className = "result-card show";
  }

  searchBtn.addEventListener("click", function () {

    hideMsg();
    hideResult();

    var queryId = searchIdInput.value.trim().toUpperCase();
    var querySubject = searchSubjectInput.value.trim().toLowerCase();

    if (queryId === "" || querySubject === "") {
      showMsg("Please enter both Ticket ID and Subject.", "err");
      return;
    }

    searchBtn.disabled = true;
    searchBtn.textContent = "Searching...";

    var url =
      SCRIPT_URL +
      "?search=1&id=" +
      encodeURIComponent(queryId) +
      "&subject=" +
      encodeURIComponent(querySubject);

    fetch(url)
      .then(function (response) {
        return response.json();
      })
      .then(function (res) {

        searchBtn.disabled = false;
        searchBtn.textContent = "Search";

        if (!res || res.result !== "ok" || !res.ticket) {
          showMsg("Invalid Ticket ID or Subject.", "err");
          return;
        }

        var ticketId = (res.ticket.ticketId || "").trim().toUpperCase();
        var subject = (res.ticket.subject || "").trim().toLowerCase();

        if (ticketId === queryId && subject === querySubject) {
          displayResult(res.ticket);
        } else {
          showMsg("Invalid Ticket ID or Subject.", "err");
        }

      })
      .catch(function (err) {

        console.log(err);

        searchBtn.disabled = false;
        searchBtn.textContent = "Search";

        showMsg("Error searching ticket.", "err");

      });

  });

  searchIdInput.addEventListener("keypress", function (e) {
    if (e.key === "Enter") searchBtn.click();
  });

  searchSubjectInput.addEventListener("keypress", function (e) {
    if (e.key === "Enter") searchBtn.click();
  });

})();
</script>

</body>
</html>
